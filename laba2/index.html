<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адаптивна навігація</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: #333;
            color: white;
        }

        .logo img {
            height: 50px; 
            display: block;
        }

        .nav-links { display: flex; list-style: none; gap: 20px; align-items: center; }
        .nav-links a { color: white; text-decoration: none; padding: 0.5rem; }
        .nav-links a:hover { color: #f4a261; }

        .dropdown { position: relative; }
        .submenu {
            display: none; position: absolute; top: 100%; left: 0;
            background: #444; list-style: none; min-width: 150px;
        }
        .dropdown:hover .submenu { display: block; }

        .search-box { margin-left: 20px; }
        .search-box input { padding: 5px; border-radius: 4px; border: none; }

        .menu-toggle { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-links {
                display: none; flex-direction: column;
                position: absolute; top: 100%; left: 0; width: 100%;
                background: #333; padding: 1rem;
            }
            .nav-links.active { display: flex; }
            .search-box { margin: 10px 0; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">
            <img src="images.png" alt="Логотип">
        </a>

        <button class="menu-toggle" aria-label="Відкрити меню">☰</button>
        
        <nav class="nav-links" id="nav">
            <ul>
                <li><a href="#">Головна</a></li>
                <li class="dropdown">
                    <a href="#">Послуги ▾</a>
                    <ul class="submenu">
                        <li><a href="#">Веб-розробка</a></li>
                        <li><a href="#">Дизайн</a></li>
                    </ul>
                </li>
                <li><a href="#">Про нас</a></li>
                <li><a href="#">Контакти</a></li>
            </ul>
            
            <div class="search-box">
                <input type="search" placeholder="Пошук...">
            </div>
        </nav>
    </header>

    <script>
        const toggleButton = document.querySelector('.menu-toggle');
        const navLinks = document.getElementById('nav');
        toggleButton.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
