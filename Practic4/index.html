<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Інтерактивна сторінка</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 0; 
            margin: 0; 
            background-color: var(--light);
            color: #334155;
            line-height: 1.6;
        }

        .container { max-width: 900px; margin: auto; padding: 40px 20px; }

        header {
            background: var(--dark);
            color: white;
            padding: 1rem 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dropdown { position: relative; display: inline-block; }
        .dropdown-btn { background: var(--primary); color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
        .dropdown-content { 
            display: none; position: absolute; background: white; min-width: 200px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); z-index: 1; border-radius: 5px;
        }
        .dropdown-content a { color: #334155; padding: 12px 16px; text-decoration: none; display: block; }
        .dropdown-content a:hover { background-color: #f1f5f9; }
        .dropdown:hover .dropdown-content { display: block; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 100;
        }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 40px; border-radius: 10px; width: 400px; text-align: center; }

        .form-container { background: white; padding: 30px; border-radius: 10px; margin: 30px 0; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 5px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 30px 0; }
        .gallery img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; transition: transform 0.3s; }
        .gallery img:hover { transform: scale(1.05); }

        #scrollTop {
            position: fixed; bottom: 30px; right: 30px; display: none;
            padding: 15px; background: var(--dark); color: white; border: none; cursor: pointer; border-radius: 50%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Інтерактивний Сайт</h1>
        <div class="dropdown">
            <button class="dropdown-btn">Меню навігації ▾</button>
            <div class="dropdown-content">
                <a href="#about">Про проєкт</a>
                <a href="#form">Зворотний зв'язок</a>
                <a href="#gallery">Галерея</a>
            </div>
        </div>
    </header>

    <div class="container" id="about">
        <section>
            <h2>Ласкаво просимо</h2>
            <p>Це сайт для практичного заннятя</p>
        </section>

        <button id="openModal">Відкрити вітальне вікно</button>

        <div class="modal" id="modal">
            <div class="modal-content">
                <h2>Привіт!</h2>
                <p>Це модальне вікно, яке з'явилося після натискання кнопки.</p>
                <button id="closeModal">Закрити</button>
            </div>
        </div>

        <section id="form" class="form-container">
            <h2>Форма зворотного зв'язку</h2>
            <form id="feedbackForm">
                <label>Введіть ваш email:</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
                <button type="submit">Надіслати повідомлення</button>
                <p id="formFeedback"></p>
            </form>
        </section>

        <section id="gallery">
            <h2>Галерея проєктів</h2>
            <div class="gallery">
                <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97" alt="Coding">
                <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" alt="Tech">
                <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c" alt="Design">
            </div>
        </section>
    </div>

    <button id="scrollTop">↑</button>

    <script>
        const modal = document.getElementById('modal');
        document.getElementById('openModal').addEventListener('click', () => modal.classList.add('active'));
        document.getElementById('closeModal').addEventListener('click', () => modal.classList.remove('active'));

        document.getElementById('feedbackForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const feedback = document.getElementById('formFeedback');
            if(email.includes('@')) {
                feedback.textContent = "Дякуємо! Повідомлення надіслано.";
                feedback.style.color = "green";
            } else {
                feedback.textContent = "Будь ласка, введіть коректний email.";
                feedback.style.color = "red";
            }
        });

        const scrollBtn = document.getElementById('scrollTop');
        window.onscroll = () => {
            scrollBtn.style.display = (window.scrollY > 300) ? "block" : "none";
        };
        scrollBtn.onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});
    </script>
</body>
</html>
